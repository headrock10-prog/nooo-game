  <style>
    :root { --paper:#eee1c4; --ink:#182126; --gold:#d4a942; --red:#af423b; --blue:#294d62; --panel:#132027; --muted:#93a3a1; }
    *{box-sizing:border-box} body{margin:0;background:#111a1d;color:#f5ecd9;font-family:"Yu Gothic UI","Hiragino Sans",sans-serif;min-height:100dvh;display:flex;justify-content:center}
    button{font:inherit;color:inherit;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}.app{width:min(100%,520px);min-height:100dvh;background:linear-gradient(170deg,#243b41,#10191d 72%);overflow:hidden;position:relative;padding:env(safe-area-inset-top) 14px calc(14px + env(safe-area-inset-bottom))}
    .top{display:flex;align-items:center;gap:10px;padding:12px 3px 10px}.hero{width:44px;height:44px;border-radius:50%;background:url('./hero-strategist.png') center/cover;border:2px solid var(--gold)}h1{font-family:serif;font-size:18px;letter-spacing:.12em;margin:0;flex:1}.day{font-size:12px;color:#d9c497;text-align:right}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}.stat{background:#10191dcc;border:1px solid #44545a;border-radius:10px;padding:6px 9px;font-size:12px;color:#b8c3bd}.stat b{display:block;color:#fff2ce;font-size:18px;line-height:20px}
    .map-wrap{background:#0b1316;border:1px solid #45555a;border-radius:16px;padding:8px;box-shadow:0 12px 30px #0007}.map{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 7px;background:repeating-linear-gradient(90deg,#1b2a2d 0 10px,#213438 10px 20px);padding:9px;border-radius:10px}.route-lines{position:absolute;z-index:0;inset:9px;width:calc(100% - 18px);height:calc(100% - 18px);pointer-events:none;overflow:visible}.node{z-index:1;aspect-ratio:1;border-radius:50%;position:relative;background-position:center;background-size:cover;overflow:visible;border:2px solid #8b967b;box-shadow:inset 0 0 0 1px #0008,0 2px 5px #0009}.node:after{content:"";position:absolute;inset:0;border-radius:50%;background:#07101455;pointer-events:none}.node .n{position:absolute;z-index:2;left:50%;top:67%;translate:-50% -50%;width:82%;text-align:center;line-height:1.05;font-size:10px;color:#fff2ce;text-shadow:0 1px 3px #000;font-weight:bold;overflow-wrap:anywhere}.node .step{position:absolute;z-index:3;left:-3px;top:-5px;width:17px;height:17px;line-height:17px;text-align:center;border-radius:50%;background:#ead19a;color:#263135;font-size:10px;font-weight:bold;border:1px solid #584b31}.node .icon{position:absolute;z-index:2;left:50%;top:36%;translate:-50% -50%;font-size:20px;text-shadow:0 2px 3px #000}.node.empty-node{width:50%;justify-self:center;align-self:center;border-color:#b49a55;background:#263034!important;box-shadow:0 0 0 3px #172326,0 2px 4px #0008}.node.empty-node:after{background:#16232666}.node.empty-node .icon{top:50%;font-size:15px}.node.empty-node .n{display:none}.node.empty-node .step{scale:.8;left:-6px;top:-8px}.node.current{outline:3px solid var(--gold);outline-offset:2px}.node.cleared{filter:saturate(.35);opacity:.7}.token{position:absolute;z-index:5;left:50%;top:50%;translate:-50% -50%;width:30px;height:30px;border-radius:50%;border:2px solid #fff0bd;background:url('./hero-strategist.png') center/cover;box-shadow:0 0 0 3px #9b342f,0 3px 8px #000}.enemy-token{position:absolute;z-index:4;right:-6px;bottom:-6px;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:#8d302f;border:2px solid #f0c780;color:#fff4d5;font-style:normal;font-size:14px;box-shadow:0 2px 5px #000}
    .objective{margin:12px 3px 8px;padding:10px 12px;background:#243035;border-left:3px solid var(--gold);border-radius:5px;font-size:13px;line-height:1.45}.objective strong{color:#f7d674}.log{height:44px;overflow:auto;color:#bdc8c0;font-size:12px;line-height:1.45;padding:3px 5px}.cards-label{display:flex;justify-content:space-between;align-items:center;margin:4px 3px 7px;font-size:13px;color:#d9c597}.hand{display:flex;gap:8px;overflow-x:auto;padding:0 2px 10px;scroll-snap-type:x mandatory}.card{min-width:104px;width:104px;height:137px;border-radius:10px;overflow:hidden;border:1px solid #796b4b;background:#eee1c4;color:#172126;text-align:left;padding:0;scroll-snap-align:start;box-shadow:0 5px 12px #0006}.card:disabled{filter:grayscale(1);opacity:.42}.card img{display:block;width:100%;height:70px;object-fit:cover}.card b{display:block;font-size:12px;padding:5px 7px 0}.card span{display:block;font-size:10px;padding:2px 7px;line-height:1.25;color:#4a4439}
    .action{position:sticky;bottom:0;padding:10px 0 1px;background:linear-gradient(transparent,#10191d 20%)}.roll{width:100%;border-radius:13px;padding:14px;background:linear-gradient(#be544b,#8c302e);font-weight:bold;font-size:16px;box-shadow:inset 0 1px #f29883,0 4px 10px #0007}.roll:disabled{background:#556064;color:#b4b8b5}.dice-choice{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-top:9px}.dice-choice.show{display:grid}.die{padding:12px;border-radius:11px;background:#e8dbbc;color:#1b2728;font-size:15px;font-weight:bold;box-shadow:0 3px 8px #0008}.die em{font-style:normal;font-size:28px;margin-right:8px;color:#a13d36}.modal{position:fixed;z-index:10;top:0;bottom:0;left:50%;translate:-50% 0;width:min(100%,520px);background:#071014e8;display:none;align-items:end;padding:16px}.modal.show{display:flex}.sheet{width:100%;max-height:83dvh;overflow:auto;background:linear-gradient(135deg,#26353a,#142025);border:1px solid #736543;border-radius:18px;padding:18px;box-shadow:0 12px 40px #000}.enemy{display:flex;gap:13px;align-items:center}.enemy img{width:95px;height:95px;object-fit:cover;border-radius:12px;border:2px solid #b16b50}.enemy h2{font-family:serif;margin:0;font-size:22px}.enemy p{margin:5px 0;color:#c2c9c2;font-size:12px}.bar{height:10px;background:#090e10;border-radius:9px;overflow:hidden;margin:11px 0}.bar i{display:block;height:100%;background:linear-gradient(90deg,#c5574f,#e0a04a);width:100%;transition:.25s}.battle-text{min-height:42px;font-size:13px;line-height:1.5;color:#d9ded5}.choices{display:grid;gap:8px;margin-top:12px}.choice{padding:12px;border-radius:10px;background:#304349;text-align:left;border:1px solid #607477}.choice small{display:block;color:#bbcbc2;margin-top:3px}.close{width:100%;margin-top:12px;padding:12px;border-radius:10px;background:#a8463f;font-weight:bold}.event-art{width:100%;max-height:180px;object-fit:cover;border-radius:11px;margin-bottom:10px}.store-row{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #4b5a59;padding:10px 0;font-size:13px}.buy{background:#bf963e;color:#1d1911;border-radius:7px;padding:7px 10px;font-weight:bold}.tag{font-size:11px;color:#d9bb72}
    .ally{display:flex;justify-content:space-between;align-items:center;margin:13px 0 2px;color:#d7e5d8;font-size:12px}.ally b{font-size:16px;color:#fff0c7}.ally+.bar i{background:linear-gradient(90deg,#4d9769,#b6d477)}
    /* Image-forward presentation: keep the generated artwork visible. */
    .hero{width:58px;height:58px;flex:0 0 58px;border-radius:14px;background-position:center 24%;box-shadow:0 3px 10px #0009}
    .node:after{background:linear-gradient(to bottom,transparent 0 46%,rgba(7,16,20,.25) 62%,rgba(7,16,20,.9) 100%)}
    .node .n{top:auto;bottom:7px;translate:-50% 0;font-size:10px}
    .node .icon{left:auto;right:5px;top:5px;translate:0;width:23px;height:23px;display:grid;place-items:center;border-radius:50%;background:#071014b8;border:1px solid #e4ca8d99;font-size:14px;line-height:1}
    .node.empty-node .icon{right:50%;top:50%;translate:50% -50%;background:transparent;border:0}
    .token{left:17px;top:17px;translate:-50% -50%;width:25px;height:25px;background-position:center 24%}
    .card img{height:78px;object-position:center 28%}
  </style>

<body><main class="app">
  <header class="top"><div class="hero"></div><h1>乱 世 行 路</h1><div class="day" id="stage">第一章<br>黒岩州</div></header>
  <section class="stats"><div class="stat">兵力<b id="hp">24 / 24</b></div><div class="stat">軍資金<b id="gold">60</b></div><div class="stat">軍略<b id="power">3</b></div></section>
  <section class="map-wrap"><div class="map" id="map"></div></section>
  <div class="objective"><strong>目標：</strong>西方の〈黒岩城〉を落とし、戦線を突破せよ。</div>
  <div class="log" id="log">乱世は動き出した。二つの出目から、進軍の距離を選べ。</div>
  <div class="cards-label"><span>軍略札</span><span id="deck">残り 3 枚</span></div><section class="hand" id="hand"></section>
  <section class="action"><button class="roll" id="roll">⚄　進軍の骰子を振る</button><div class="dice-choice" id="dice"></div></section>
  <aside class="modal" id="modal"><div class="sheet" id="sheet"></div></aside>
</main>
<script>
const A='./';
let nodes=[
 ['出陣','start','terrain-fertile-plains.png'],['荒野','empty','terrain-fertile-plains.png'],['山関','fight','terrain-mountain-pass.png'],['泉','spring','card-healing-spring.png'],
 ['平野','empty','terrain-fertile-plains.png'],['税収','gold','terrain-fertile-plains.png'],['港町','store','terrain-coastal-harbor.png'],['竹関','elite','card-bamboo-ambush.png'],
 ['兵糧庫','supply','terrain-mountain-pass.png'],['行商','store','terrain-marketplace.png'],['峡谷','fight','terrain-mountain-pass.png'],['泉','spring','card-healing-spring.png'],
 ['古戦場','empty','terrain-fertile-plains.png'],['黒衣','mystery','mysterious-hooded-figure.png'],['海門','elite','terrain-coastal-harbor.png'],['戦利品','bonus','terrain-marketplace.png'],
 ['断崖関','elite','terrain-mountain-pass.png'],['野営','spring','card-healing-spring.png'],['黒岩城','boss','terrain-fortified-castle.png'],['終戦','end','terrain-fertile-plains.png']
];
const stages=[nodes,
 [
 ['出航','start','terrain-coastal-harbor.png'],['海路','empty','terrain-coastal-harbor.png'],['波止場','store','terrain-marketplace.png'],['潮の泉','spring','card-healing-spring.png'],
 ['干潟','empty','terrain-coastal-harbor.png'],['交易税','gold','terrain-marketplace.png'],['灯台港','store','terrain-coastal-harbor.png'],['海門砦','elite','terrain-fortified-castle.png'],
 ['補給船','supply','card-supply-convoy.png'],['闇商人','store','terrain-marketplace.png'],['暴風域','fight','terrain-coastal-harbor.png'],['潮だまり','spring','card-healing-spring.png'],
 ['海峡','empty','terrain-coastal-harbor.png'],['黒衣','mystery','mysterious-hooded-figure.png'],['海賊船団','elite','terrain-coastal-harbor.png'],['沈没船','bonus','terrain-coastal-harbor.png'],
 ['大防波堤','elite','terrain-fortified-castle.png'],['船着場','spring','terrain-coastal-harbor.png'],['蒼波城','boss','terrain-fortified-castle.png'],['制海','end','terrain-coastal-harbor.png']
 ],
 [
 ['入京','start','terrain-fortified-castle.png'],['街道','empty','terrain-fertile-plains.png'],['市門','store','terrain-marketplace.png'],['神泉','spring','card-healing-spring.png'],
 ['都外れ','empty','terrain-fertile-plains.png'],['官税','gold','terrain-marketplace.png'],['軍需市場','store','terrain-marketplace.png'],['朱雀門','elite','terrain-fortified-castle.png'],
 ['兵站本部','supply','card-supply-convoy.png'],['密売所','store','terrain-marketplace.png'],['内乱地','fight','terrain-fertile-plains.png'],['寺院の泉','spring','card-healing-spring.png'],
 ['王都路','empty','terrain-fertile-plains.png'],['黒衣','mystery','mysterious-hooded-figure.png'],['禁衛軍','elite','terrain-fortified-castle.png'],['皇庫','bonus','terrain-marketplace.png'],
 ['天宮門','elite','terrain-fortified-castle.png'],['神域前','spring','card-sealed-gate.png'],['天輪宮','boss','card-sealed-gate.png'],['終局','end','terrain-fortified-castle.png']
 ]];
const stageNames=['第一章<br>黒岩州','第二章<br>海門州','第三章<br>王都圏'];
const stageBosses=[{n:'黒岩城主・厳武',img:'boss-mountain-warlord.png',hp:32,atk:7},{n:'蒼波城主・海蓮',img:'boss-harbor-pirate-queen.png',hp:38,atk:8},{n:'天輪の神・無貌',img:'mysterious-hooded-figure.png',hp:46,atk:9}];
const cards=[
 {n:'騎馬突撃',d:'敵に7ダメージ',v:7,img:'card-cavalry-charge.png'}, {n:'火計',d:'敵に10ダメージ',v:10,img:'card-fire-attack.png'}, {n:'伏兵',d:'敵に5ダメージ・被害を3軽減',v:5,guard:3,img:'card-bamboo-ambush.png'}, {n:'兵站整備',d:'兵力を6回復',heal:6,img:'card-supply-convoy.png'}, {n:'偵察',d:'敵に4ダメージ・反撃を2軽減',v:4,scout:2,img:'card-scout.png'}
 ,{n:'槍衾',d:'敵に3ダメージ・被害を5軽減',v:3,guard:5,img:'card-spear-formation.png'}, {n:'強行軍',d:'敵に6ダメージ・兵力を2回復',v:6,heal:2,img:'card-cavalry-charge.png'}, {n:'離間の計',d:'敵に2ダメージ・反撃を4軽減',v:2,weaken:4,img:'card-diplomatic-pact.png'}, {n:'戦鼓',d:'敵に4ダメージ・札を1枚引く',v:4,draw:1,img:'card-spear-formation.png'}, {n:'徴兵',d:'兵力を5回復・軍資金8を消費',heal:5,cost:8,img:'card-recruitment.png'}, {n:'夜襲',d:'敵に9ダメージ・反撃を2軽減',v:9,scout:2,img:'card-bamboo-ambush.png'}, {n:'略奪',d:'敵に5ダメージ・軍資金12を得る',v:5,gold:12,img:'card-supply-convoy.png'}, {n:'破城槌',d:'敵に13ダメージ・軍資金6を消費',v:13,cost:6,img:'card-fire-attack.png'}, {n:'看破',d:'札を2枚引き、反撃を3軽減',draw:2,scout:3,img:'card-scout.png'}, {n:'軍議',d:'兵力を3回復・札を1枚引く',heal:3,draw:1,img:'card-diplomatic-pact.png'}
];
let state={stage:0,pos:0,enemyPos:16,turn:0,hp:24,max:24,gold:60,deck:[0,0,1,2,2],hand:[],discard:[],inBattle:false,enemy:null,used:false,cleared:new Set(),die:null,rerollUsed:false,guard:0,scout:0,weaken:0};
const $=id=>document.getElementById(id); const log=t=>{ $('log').innerHTML=`<b>軍記：</b>${t}` };
function render(){
 $('hp').textContent=`${state.hp} / ${state.max}`;$('gold').textContent=state.gold;$('power').textContent=state.hand.length;$('deck').textContent=state.inBattle?`手札 ${state.hand.length} 枚`:`山札 ${state.deck.length+state.discard.length} 枚`; $('stage').innerHTML=stageNames[state.stage];
 const route='50,52 150,52 250,52 350,52 350,163 250,163 150,163 50,163 50,274 150,274 250,274 350,274 350,385 250,385 150,385 50,385 50,496 150,496 250,496 350,496';
 $('map').innerHTML=`<svg class="route-lines" viewBox="0 0 400 548" preserveAspectRatio="none" aria-hidden="true"><defs><marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d4a942"/></marker></defs><polyline points="${route}" fill="none" stroke="#071014" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/><polyline points="${route}" fill="none" stroke="#d4a942" stroke-width="4" stroke-dasharray="8 7" stroke-linecap="round" stroke-linejoin="round" marker-mid="url(#arrow)"/></svg>`+nodes.map((x,i)=>{let row=Math.floor(i/4),col=row%2===0?i%4:3-(i%4);return `<div class="node ${x[1]==='empty'?'empty-node':''} ${i===state.pos?'current':''} ${state.cleared.has(i)?'cleared':''}" style="grid-row:${row+1};grid-column:${col+1};background-image:url('${A+x[2]}')"><span class="step">${i+1}</span><span class="n">${x[0]}</span><span class="icon">${icon(x[1])}</span>${i===state.enemyPos?'<i class="enemy-token">⚔</i>':''}${i===state.pos?'<i class="token"></i>':''}</div>`}).join('');
 $('hand').innerHTML=state.hand.map((c,i)=>{let x=cards[c];return `<button class="card" ${state.inBattle?'':'disabled'} onclick="play(${i})"><img src="${A+x.img}"><b>${x.n}</b><span>${x.d}</span></button>`}).join('');
}
function icon(t){return({start:'⚑',empty:'·',store:'⚖',fight:'⚔',spring:'♨',mystery:'?',elite:'☠',boss:'♛',end:'★',gold:'¤',supply:'▣',bonus:'✦'})[t]}
function roll(){state.die=1+Math.floor(Math.random()*6);state.rerollUsed=false;$('roll').disabled=true;showDie('第一投。今の出目で進軍するか、出目を捨ててもう一度だけ振るか選べ。')}
function showDie(message){$('dice').classList.add('show');$('dice').innerHTML=`<button class="die" onclick="move()"><em>⚄</em>出目 ${state.die}<br><small>この目で進軍する</small></button>${state.rerollUsed?'':`<button class="die" onclick="reroll()"><em>↻</em>振り直す<br><small>第一投は失われる</small></button>`}`;log(message)}
function reroll(){state.die=1+Math.floor(Math.random()*6);state.rerollUsed=true;showDie(`第二投は <b>${state.die}</b>。第一投には戻れない。この目で進軍せよ。`)}
function move(){let n=state.die;$('dice').classList.remove('show');let target=Math.min(nodes.length-1,state.pos+n),bossIndex=18;if(state.pos<bossIndex&&target>bossIndex&&!state.cleared.has(bossIndex)){target=bossIndex;log(`出目 ${n} だが、〈黒岩城〉を素通りはできない。城前で軍を止める。`)}state.pos=target;state.die=null;state.turn++;$('roll').disabled=false;if(state.pos>=state.enemyPos){state.pos=state.enemyPos;render();log('敵軍と接触した。遭遇戦が始まる！');setTimeout(()=>battle('invasion'),350);return}if(state.turn%2===0&&state.enemyPos>state.pos){state.enemyPos=Math.max(state.pos,state.enemyPos-(1+Math.floor(Math.random()*2)));if(state.enemyPos===state.pos){render();log('敵軍がこちらへ迫り、行軍路で激突した！');setTimeout(()=>battle('invasion'),350);return}}let here=nodes[state.pos];render();if(target!==bossIndex||state.cleared.has(bossIndex))log(`軍は ${n} マス進軍し、〈${here[0]}〉へ到着した。敵軍は〈${nodes[state.enemyPos][0]}〉付近まで進軍している。`);setTimeout(()=>land(here[1]),350)}
function land(type){if(type==='end'){chapterClear();return}if(type==='start'||type==='empty'){log(type==='empty'?'荒野を抜けた。何も起こらない静かな一日だ。':'次の県へ進む準備が整った。');return} if(type==='store')store();else if(type==='spring')spring();else if(type==='mystery')mystery();else if(type==='gold')treasury();else if(type==='supply')supply();else if(type==='bonus')bonus();else battle(type)}
function treasury(){let gain=10+Math.floor(Math.random()*11);state.gold+=gain;open(`<img class="event-art" src="${A}terrain-fertile-plains.png"><h2>税収地</h2><p>領民から軍資金 <b>${gain}</b> を得た。</p><button class="close" onclick="closeSheet()">進軍を続ける</button>`)}
function supply(){let gain=Math.min(5,state.max-state.hp);state.hp+=gain;open(`<img class="event-art" src="${A}terrain-mountain-pass.png"><h2>兵糧庫</h2><p>補給を受け、兵力を <b>${gain}</b> 回復した。</p><button class="close" onclick="closeSheet()">進軍を続ける</button>`)}
function bonus(){state.gold+=25;state.hp=Math.min(state.max,state.hp+3);open(`<img class="event-art" src="${A}terrain-marketplace.png"><h2>戦利品</h2><p>放棄された補給車を発見。軍資金 <b>25</b> と兵力 <b>3</b> を得た。</p><button class="close" onclick="closeSheet()">進軍を続ける</button>`)}
function open(html){$('sheet').innerHTML=html;$('modal').classList.add('show')} function closeSheet(){ $('modal').classList.remove('show');render() } window.closeSheet=closeSheet; window.close=closeSheet;
function spring(){let gain=Math.min(8,state.max-state.hp);state.hp+=gain;open(`<img class="event-art" src="${A}card-healing-spring.png"><h2>癒やしの泉</h2><p>冷たい水が兵の傷を癒やす。兵力を ${gain} 回復した。</p><button class="close" onclick="closeSheet()">進軍を続ける</button>`)}
function store(){open(`<img class="event-art" src="${A}terrain-marketplace.png"><h2>戦場の商店</h2><p>軍資金：<b>${state.gold}</b></p><div class="store-row"><span><b>偵察</b><br><span class="tag">敵の策を読む。次の戦闘で敵攻撃 -2</span></span><button class="buy" onclick="buy('scout',20)">20</button></div><div class="store-row"><span><b>軍略札：槍衾</b><br><span class="tag">敵に6ダメージ</span></span><button class="buy" onclick="buy('card',30)">30</button></div><div class="store-row"><span><b>兵糧</b><br><span class="tag">兵力を6回復</span></span><button class="buy" onclick="buy('heal',18)">18</button></div><button class="close" onclick="closeSheet()">店を出る</button>`)}
function buy(t,c){if(state.gold<c){log('軍資金が足りない。');return}state.gold-=c;if(t==='heal')state.hp=Math.min(state.max,state.hp+6);if(t==='card')state.discard.push(2);if(t==='scout')state.scout=2;log('商店で軍備を整えた。');store();render()}
function mystery(){let good=Math.random()>.45;if(good){state.discard.push(1);open(`<img class="event-art" src="${A}mysterious-hooded-figure.png"><h2>黒衣の何者か</h2><p>「まだ盤上を降りるには早い」<br>黒衣の者は火計の札を残して消えた。次の戦闘から山札に加わる。</p><button class="close" onclick="closeSheet()">受け取る</button>`)}else{state.hp=Math.max(1,state.hp-4);open(`<img class="event-art" src="${A}mysterious-hooded-figure.png"><h2>黒衣の何者か</h2><p>影が戦場を横切る。兵力を4失った。<br>「より強い魂を見せよ」</p><button class="close" onclick="closeSheet()">進軍を続ける</button>`)} }
function drawCards(n){for(let i=0;i<n;i++){if(!state.deck.length&&state.discard.length){state.deck=state.discard.sort(()=>Math.random()-.5);state.discard=[]}if(state.deck.length)state.hand.push(state.deck.pop())}}
const normalEnemies=[
 {n:'赤槍の兵長・丹武',hp:14,atk:4,img:'boss-plains-rebel-general.png',reward:20}, {n:'港の略奪者・水刃',hp:13,atk:5,img:'boss-harbor-pirate-queen.png',reward:22}, {n:'山賊頭・岩牙',hp:17,atk:3,img:'boss-mountain-warlord.png',reward:20}, {n:'逃亡武官・白篝',hp:15,atk:4,img:'hero-strategist.png',reward:21},
 {n:'弓騎兵・疾風',hp:12,atk:6,img:'boss-plains-rebel-general.png',reward:23}, {n:'密偵隊・影縫い',hp:11,atk:5,img:'mysterious-hooded-figure.png',reward:24}, {n:'城門守・鉄鎧',hp:18,atk:3,img:'boss-mountain-warlord.png',reward:21}, {n:'河賊の女頭・碧波',hp:14,atk:5,img:'boss-harbor-pirate-queen.png',reward:23}
];
const eliteEnemies=[
 {n:'鬼面千人長・朱猿',hp:24,atk:5,img:'boss-plains-rebel-general.png',reward:36}, {n:'黒馬の女将・凪',hp:20,atk:7,img:'boss-harbor-pirate-queen.png',reward:39}, {n:'岩山の鉄壁・玄鉄',hp:27,atk:4,img:'boss-mountain-warlord.png',reward:37}, {n:'黄旗の将・燈真',hp:22,atk:6,img:'hero-strategist.png',reward:38}, {n:'獣面連隊長・牙王',hp:25,atk:5,img:'boss-mountain-warlord.png',reward:38}, {n:'影軍師・烏羽',hp:19,atk:7,img:'mysterious-hooded-figure.png',reward:40}
];
const invasionEnemies=[
 {n:'侵攻軍・赤槍隊',hp:18,atk:5,img:'boss-plains-rebel-general.png',reward:28}, {n:'侵攻軍・黒旗騎兵',hp:16,atk:6,img:'boss-mountain-warlord.png',reward:30}, {n:'侵攻軍・潮騒衆',hp:17,atk:5,img:'boss-harbor-pirate-queen.png',reward:29}, {n:'侵攻軍・影の斥候',hp:14,atk:7,img:'mysterious-hooded-figure.png',reward:31}, {n:'侵攻軍・白狼衆',hp:20,atk:4,img:'hero-strategist.png',reward:28}
];
function pickEnemy(list){return {...list[Math.floor(Math.random()*list.length)]}}
function battle(kind){let b=stageBosses[state.stage],e=kind==='boss'?{n:b.n,hp:b.hp,max:b.hp,atk:b.atk,img:b.img,reward:60+state.stage*20}:kind==='elite'?pickEnemy(eliteEnemies):kind==='invasion'?{...pickEnemy(invasionEnemies),invader:true}:pickEnemy(normalEnemies);e.max=e.hp;state.inBattle=true;state.enemy=e;state.used=false;state.guard=0;state.weaken=0;drawCards(3);render();battleView3(e.invader?'敵軍が行軍路を塞いだ。押し返せ！':'敵軍が進軍を阻む。軍略札を選べ。')}
function battleView(text){let e=state.enemy;open(`<div class="enemy"><img src="${A+e.img}"><div><h2>${e.n}</h2><p>敵兵力 ${e.hp} / ${e.max}</p><div class="bar"><i style="width:${e.hp/e.max*100}%"></i></div></div></div><div class="battle-text">${text}</div><div class="choices"><button class="choice" onclick="strike()">⚔ 通常攻撃 <small>敵に 4 ダメージ。敵は反撃する。</small></button><button class="choice" onclick="close()">軍略札を使う <small>画面下の札をタップする。</small></button></div>`)}
function battleView2(text){let e=state.enemy;open(`<div class="enemy"><img src="${A+e.img}"><div><h2>${e.n}</h2><p>敵兵力 ${e.hp} / ${e.max}</p><div class="bar"><i style="width:${e.hp/e.max*100}%"></i></div></div></div><div class="ally"><span>⚑ 自軍兵力</span><b>${state.hp} / ${state.max}</b></div><div class="bar"><i style="width:${state.hp/state.max*100}%"></i></div><div class="battle-text">${text}</div><div class="choices"><button class="choice" onclick="strike()">⚔ 通常攻撃 <small>敵に 4 ダメージ。敵は反撃する。</small></button><button class="choice" onclick="close()">軍略札を使う <small>画面下の札をタップする。</small></button></div>`) }
function battleView3(text){let e=state.enemy,hand=state.hand.length?state.hand.map((id,i)=>`<button class="choice" onclick="play(${i})"><b>◆ ${cards[id].n}</b><small>${cards[id].d}</small></button>`).join(''):`<p class="tag">手札は尽きた。通常攻撃で戦え。</p>`;open(`<div class="enemy"><img src="${A+e.img}"><div><h2>${e.n}</h2><p>敵兵力 ${e.hp} / ${e.max}</p><div class="bar"><i style="width:${e.hp/e.max*100}%"></i></div></div></div><div class="ally"><span>⚑ 自軍兵力</span><b>${state.hp} / ${state.max}</b></div><div class="bar"><i style="width:${state.hp/state.max*100}%"></i></div><div class="battle-text">${text}</div><div class="choices"><button class="choice" onclick="strike()">⚔ 通常攻撃 <small>敵に 4 ダメージ。敵は反撃する。</small></button></div><p class="tag">軍略札 — 使用すると捨て札へ送られる</p><div class="choices">${hand}</div>`) }
function strike(){damage(4,'兵は正面から斬り込んだ。')}
function play(i){if(!state.inBattle)return;let id=state.hand[i],c=cards[id];if(c.cost&&state.gold<c.cost){battleView3(`〈${c.n}〉には軍資金 ${c.cost} が必要だ。`);return}state.hand.splice(i,1);state.discard.push(id);if(c.cost)state.gold-=c.cost;if(c.gold)state.gold+=c.gold;if(c.heal)state.hp=Math.min(state.max,state.hp+c.heal);if(c.guard)state.guard=Math.max(state.guard,c.guard);if(c.scout)state.scout=Math.max(state.scout,c.scout);if(c.weaken)state.weaken=Math.max(state.weaken,c.weaken);if(c.draw)drawCards(c.draw);damage(c.v||0,`〈${c.n}〉を発動。`)}
function damage(v,msg){let e=state.enemy;e.hp-=v;if(e.hp<=0){state.gold+=e.reward;if(e.invader)state.enemyPos=Math.min(17,state.enemyPos+3);else state.cleared.add(state.pos);state.inBattle=false;state.discard.push(...state.hand);state.hand=[];reward(e,msg);return}let hit=Math.max(0,e.atk-state.scout-state.guard-state.weaken);state.scout=0;state.guard=0;state.weaken=0;state.hp-=hit;if(state.hp<=0){state.hp=0;open(`<img class="event-art" src="${A}mysterious-hooded-figure.png"><h2>敗北 ― そして帰還</h2><p>黒衣の者が囁く。「戦の記憶は、次の生へ残る」</p><button class="close" onclick="rebirth()">転生する</button>`);return}battleView3(`${msg} 敵に ${v} ダメージ。反撃で兵力を ${hit} 失った。`);render()}
function reward(e,msg){let picks=[0,1,2,3,4].sort(()=>Math.random()-.5).slice(0,3);open(`<img class="event-art" src="${A+e.img}"><h2>勝利</h2><p>${msg} ${e.n}を破った。軍資金 ${e.reward} を得た。<br><b>軍略札を1枚選べ。</b></p><div class="choices">${picks.map(id=>`<button class="choice" onclick="takeReward(${id})"><b>${cards[id].n}</b><small>${cards[id].d}</small></button>`).join('')}</div>`)}
function takeReward(id){state.discard.push(id);afterWin()}
function afterWin(){closeSheet();render();if(state.pos===18){state.pos=19;render();chapterClear()}else log('勝利の余韻を胸に、次の進軍を選べ。')}
function chapterClear(){ $('roll').disabled=true;let last=state.stage===stages.length-1;open(`<img class="event-art" src="${A}${last?'mysterious-hooded-figure.png':'terrain-coastal-harbor.png'}"><h2>${last?'乱世統一':'地方制圧'}</h2><p>${last?'天輪の神を退け、長い争乱に終止符を打った。':'次の戦線が開かれた。軍資金・兵力・軍略札を引き継いで進め。'}</p><button class="close" onclick="${last?'rebirth()':'nextStage()'}">${last?'第一章から遊ぶ':'次の地方へ'}</button>`)}
function nextStage(){state.stage++;nodes=stages[state.stage];state.pos=0;state.enemyPos=16;state.turn=0;state.hp=Math.min(state.max,state.hp+6);state.cleared=new Set();closeSheet();render();log(`${stageNames[state.stage].replace('<br>','・')}へ進軍する。兵力を6回復した。`) }
function rebirth(){nodes=stages[0];state={stage:0,pos:0,enemyPos:16,turn:0,hp:24,max:24,gold:60,deck:[0,0,1,2,2,2],hand:[],discard:[],inBattle:false,enemy:null,used:false,cleared:new Set(),die:null,rerollUsed:false,guard:0,scout:0,weaken:0};closeSheet();render();log('前世の軍略〈伏兵〉を携え、再び乱世へ。')}
$('roll').onclick=roll;render();
</script></body></html>
