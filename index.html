<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#10191d">
  <title>Murata Games</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100dvh;background:radial-gradient(circle at 50% 0,#26383b 0,#10191d 48%,#090e10 100%);color:#fff1cf;font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN",sans-serif;display:grid;place-items:center;padding:calc(24px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom))}
    .wrap{width:min(100%,520px)}
    .eyebrow{font-size:11px;letter-spacing:.32em;color:#9cafaa;margin-bottom:8px}
    h1{font-family:serif;letter-spacing:.14em;margin:0 0 8px;font-size:30px}
    .lead{color:#b9c5be;line-height:1.65;margin:0 0 24px;font-size:14px}
    .games{display:grid;gap:15px}
    .game{display:block;text-decoration:none;color:inherit;border:1px solid #53645f;border-radius:18px;overflow:hidden;padding:21px;min-height:158px;position:relative;box-shadow:0 12px 30px #0007;transition:transform .12s,filter .12s}
    .game:active{transform:scale(.975);filter:brightness(1.15)}
    .game h2{margin:0 0 8px;font-family:serif;font-size:27px;letter-spacing:.06em}
    .game p{margin:0;color:#d0dad3;font-size:13px;max-width:72%;line-height:1.6}
    .tag{position:absolute;right:16px;top:17px;border-radius:99px;padding:5px 10px;font-size:10px;letter-spacing:.12em}
    .arrow{position:absolute;right:18px;bottom:18px;font-size:22px}
    .nooo{background:linear-gradient(135deg,#3c2e57,#171826 72%);border-color:#725e90}
    .nooo .tag{background:#a44368}
    .ransei{background:linear-gradient(135deg,#3d5352,#182324 72%);border-color:#8d8058}
    .ransei .tag{background:#a98231}
    .foot{font-size:11px;color:#75857e;text-align:center;margin-top:22px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">SELECT A GAME</div>
    <h1>MURATA GAMES</h1>
    <p class="lead">遊ぶゲームを選んでください。どちらもスマートフォンでそのまま遊べます。</p>
    <section class="games" aria-label="ゲーム一覧">
      <a class="game nooo" href="./nooo-mobile/index.html">
        <span class="tag">ACTION</span>
        <h2>nooo</h2>
        <p>Muモチーフのゴシック・ハクスラ。装備を集め、深層へ潜れ。</p>
        <span class="arrow" aria-hidden="true">›</span>
      </a>
      <a class="game ransei" href="./ransei-kouro/index.html">
        <span class="tag">STRATEGY</span>
        <h2>乱世行路</h2>
        <p>サイコロと軍略札で県を制圧する、戦略ローグライク。</p>
        <span class="arrow" aria-hidden="true">›</span>
      </a>
    </section>
    <div class="foot">© Murata Games</div>
  </main>
</body>
</html>
