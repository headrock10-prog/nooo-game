<head>

<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#141924;color:#f0e7d0;font-family:"Yu Gothic",sans-serif;display:grid;place-items:center;padding:12px}
#app{width:min(960px,100%);min-height:680px;background:radial-gradient(circle at 50% 0,#465b76,#202837 48%,#121721);border:2px solid #a58245;box-shadow:0 0 0 5px #292117,0 25px 70px #000;overflow:hidden}
header{padding:12px 18px;background:linear-gradient(90deg,#1b160d,#3c2b16,#1b160d);border-bottom:1px solid #9d7a3b;display:flex;justify-content:space-between;align-items:center}h1{font:900 25px Impact,"Arial Black",sans-serif;letter-spacing:3px;color:#f0c56e;margin:0;text-shadow:2px 2px #3b160c}#ver{font:12px monospace;color:#a6c9ff}
#status{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:10px;padding:12px 16px;background:#0b0d13;border-bottom:1px solid #3e3426}.panel{background:#17181c;border:1px solid #5f4d32;padding:8px 10px}.label{font-size:11px;color:#a99a7c}.bar{height:12px;background:#050505;border:1px solid #6d6048;margin:4px 0;overflow:hidden}.bar i{display:block;height:100%;transition:width .25s}.hp{background:linear-gradient(90deg,#7d1519,#ed4c4c)}.mp{background:linear-gradient(90deg,#12386f,#49adf4)}.xp{background:linear-gradient(90deg,#2f605c,#72e1b2)}
#main{display:grid;grid-template-columns:1.15fr 1fr;min-height:510px}#mapbox{padding:18px;background:radial-gradient(circle,#243529,#101b17 70%);position:relative}#map{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;aspect-ratio:1;margin:auto;max-width:470px}.cell{border:1px solid #3e523c;background:#122018;display:grid;place-items:center;font-size:18px;box-shadow:inset 0 0 12px #000;position:relative;overflow:hidden}.cell:after{content:"";position:absolute;inset:4px;border:1px solid rgba(156,194,131,.08);pointer-events:none;z-index:2}.cell.hero{outline:2px solid #ffe188;background:#35442a;box-shadow:0 0 16px #ffdc73}.cell.boss{color:#ff6a9c;background:#321721}.cell.exit{color:#85dcff;background:#162b37}.cell.mob{color:#ffb4a5;background:#2d2020}.cell.spring{color:#83eaff;background:#17323a}.cell.shop{color:#ffd782;background:#332818}.cell.treasure{color:#ffd866;background:#302a19}.cell.empty,.cell.event{color:#52644f}.cell.hero.mob,.cell.hero.boss{animation:battleCell .55s steps(2,end) infinite;outline-color:#ff7777;box-shadow:0 0 24px #ff3d4d}@keyframes battleCell{50%{background:#9a2630;filter:brightness(1.7)}}.piece{width:88%;height:88%;display:block;background-image:url('nooo-roguelike-sprites.png');background-repeat:no-repeat;background-size:300% 100%;filter:drop-shadow(0 3px 2px #000);animation:pieceBob 1.6s ease-in-out infinite}.piece.heroPiece{background-position:0 0}.piece.mobPiece{background-position:50% 0}.piece.bossPiece{background-position:100% 0;animation-duration:.9s}@keyframes pieceBob{50%{transform:translateY(-3px)}}#turnNote{min-height:23px;margin:0 auto 8px;max-width:470px;text-align:center;font-size:12px;font-weight:bold;letter-spacing:1px;color:#d5e8c6;background:#1b3023;border:1px solid #61845c;padding:3px 8px}.enemyTurn{color:#ffd0bd!important;background:#4a2525!important;border-color:#bd6559!important}.eventTurn{color:#bceeff!important;background:#1a3b4c!important;border-color:#5ca3c0!important}#hint{text-align:center;color:#9eaf9d;font-size:12px;margin-top:12px}
#battle{padding:16px;background:#111117;border-left:1px solid #51412b;display:flex;flex-direction:column;gap:10px}.scene{height:155px;background:linear-gradient(145deg,#182432,#0a0c12);border:1px solid #6a5535;display:flex;align-items:center;justify-content:space-around;position:relative;overflow:hidden}.scene:before{content:"";position:absolute;inset:0;opacity:.2;background:repeating-linear-gradient(0deg,transparent 0 3px,#000 4px)}.unit{position:relative;z-index:1;text-align:center}.sprite{font-size:70px;filter:drop-shadow(0 7px 4px #000);animation:bob 1.5s infinite ease-in-out}.enemy .sprite{filter:drop-shadow(0 0 9px #da405b)}@keyframes bob{50%{transform:translateY(-6px)}}.name{font-weight:bold;font-size:13px}.enemyhp{font-size:11px;color:#ffacac}.fairy{position:absolute;left:38%;top:18px;font-size:28px;filter:drop-shadow(0 0 8px #f2a8ff);animation:orbit 3s infinite linear}@keyframes orbit{50%{transform:translate(22px,18px)}}
#message{flex:1;min-height:115px;max-height:150px;overflow:auto;padding:9px;background:#090a0e;border:1px solid #40352a;font-size:13px;line-height:1.6}.good{color:#92e6a9}.bad{color:#ff9696}.gold{color:#ffd36e}.mute{color:#9b978d}#commands,#shopActions{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.shopbtn{border:1px solid #c59b4d;background:linear-gradient(145deg,#5d431e,#22170a);color:#ffe5a7;font-weight:bold;padding:9px;cursor:pointer}.shopbtn:hover{filter:brightness(1.25)}#shopActions{display:none}.cmd,.dir,#restart{border:1px solid #9a773b;background:linear-gradient(145deg,#4a351d,#1b120a);color:#f3dfb1;font-weight:bold;padding:10px;cursor:pointer}.cmd:disabled{filter:grayscale(1);opacity:.4}.cmd:hover,.dir:hover,#restart:hover{border-color:#ffe18a;color:#fff4cb}.cmd.skill{border-color:#5b8ab9;background:linear-gradient(145deg,#173c61,#0d1c2d)}
#move{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(2,39px);gap:5px;justify-content:center}.dir[data-d="n"]{grid-column:2}.dir[data-d="w"]{grid-row:2}.dir[data-d="s"]{grid-row:2}.dir[data-d="e"]{grid-row:2}.dir:disabled{opacity:.25}.fairyStep{display:block;margin:9px auto 0;border:1px solid #b772cf;background:linear-gradient(145deg,#44234d,#180d22);color:#ffd9ff;padding:7px 16px;font-weight:bold;cursor:pointer}.fairyStep.ready{box-shadow:0 0 14px #e18cff;border-color:#ffe0ff}.fairyStep:disabled{opacity:.3}.foot{padding:10px 16px;border-top:1px solid #51412b;background:#0d0e12;display:flex;justify-content:space-between;font-size:12px;color:#b7aa90}.mini{border:1px solid #9a773b;background:#251a0e;color:#ffe1a3;padding:4px 8px;font-weight:bold;cursor:pointer}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;place-items:center;z-index:5}.overlay.show{display:grid}.gearbox{width:min(390px,92vw);background:#16130f;border:2px solid #9f7837;box-shadow:0 12px 45px #000;padding:16px}.gearbox h2{font-size:18px;color:#f2c56a;margin:0 0 10px}.gearrow{display:flex;justify-content:space-between;gap:8px;padding:9px 0;border-bottom:1px dashed #55442b;font-size:13px}.gearrow b{color:#e9dbc0}.gearrow.equipped{background:#27341e;padding:9px;margin:0 -6px}.close{float:right}
/* 明るめの回廊配色：駒と地形が見分けやすいように調整 */
#mapbox{background:radial-gradient(circle,#496348,#22372d 70%)}.cell{background:#294532;border-color:#668765;box-shadow:inset 0 0 12px #142419}.cell:after{border-color:rgba(213,239,180,.13)}.cell.hero{background:#536b39}.cell.boss{background:#5a2737}.cell.exit{background:#274b60}.cell.mob{background:#523333}.cell.spring{background:#285966}.cell.shop{background:#5a4724}.cell.treasure{background:#5a522c}.cell.empty,.cell.event{color:#9ab698}#hint{color:#d4e3ce}#battle{background:#202330;border-left-color:#786240}.scene{background:linear-gradient(145deg,#34465d,#17202e);border-color:#9b7c4c}#message{background:#12151d;border-color:#66563e}
@media(max-width:720px){body{padding:0}#app{min-height:100vh;border:0}#status{grid-template-columns:1fr 1fr}#status .panel:last-child{grid-column:span 2}#main{grid-template-columns:1fr}#battle{border-left:0;border-top:1px solid #51412b}.scene{height:120px}.sprite{font-size:55px}}
</style></head><body><div id="app">
<header><h1>NOOO <span style="font-size:14px">黒曜の回廊</span></h1><span id="ver">COMMAND ROGUELIKE / v0.02</span></header>
<section id="status"><div class="panel"><b id="lv">Lv.1</b> <span id="floor" class="label">第1層</span><div class="label">EXP <span id="xpTxt"></span></div><div class="bar"><i class="xp" id="xp"></i></div></div><div class="panel"><div class="label">HP <span id="hpTxt"></span></div><div class="bar"><i class="hp" id="hp"></i></div><div class="label">MP <span id="mpTxt"></span></div><div class="bar"><i class="mp" id="mp"></i></div></div><div class="panel"><div>💰 <b id="gold">0</b></div><div class="label">妖精: <span id="fairyStat">同行なし</span></div><div class="label">防御 <span id="def">0</span> / 攻撃 <span id="atk">0</span></div></div></section>
<main id="main"><section id="mapbox"><div id="turnNote">あなたのターン：移動先を選択</div><div id="map"></div><div id="hint">敵・泉・商店を見ながら、進む場所を選ぶ</div><div id="move"><button class="dir" data-d="n">▲</button><button class="dir" data-d="w">◀</button><button class="dir" data-d="s">▼</button><button class="dir" data-d="e">▶</button></div></section><section id="battle"><div class="scene"><div class="unit"><div class="sprite">🛡️</div><div class="name">黒騎士 ヌー</div></div><div class="fairy" id="fairy">🧚</div><div class="unit enemy"><div class="sprite" id="enemySprite">❔</div><div class="name" id="enemyName">回廊を探索せよ</div><div class="enemyhp" id="enemyHp"></div></div></div><div id="message"></div><div id="shopActions"><button class="shopbtn" data-buy="pot">🧪 回復薬 25 Zen</button><button class="shopbtn" data-buy="rest">✨ 休息 18 Zen</button><button class="shopbtn" data-buy="leave">🚪 商店を出る</button></div><div id="commands"><button class="cmd" data-c="attack">⚔ 攻撃</button><button class="cmd skill" data-c="confuse">✦ 混乱 <small>MP 8</small></button><button class="cmd" data-c="guard">🛡 防御</button><button class="cmd" data-c="potion">🧪 回復薬</button></div></section></main>
<footer class="foot"><span id="gear">装備: 旅人の鎧</span><button class="mini" id="gearBtn">🛡 装備</button><span>回復薬 <b id="pots">3</b>　<span id="runNote">探索中</span></span></footer>
</div><div class="overlay" id="gearPanel"><div class="gearbox"><button class="mini close" id="gearClose">閉じる</button><h2>装備</h2><div class="label">ボスの遺品はここに追加されます。装備を変えると攻撃・防御が変化します。</div><div id="gearList"></div></div></div><script>
const $=s=>document.querySelector(s), cells=[], size=7;
const GEAR=[
  {name:'旅人の鎧',atk:0,def:0,desc:'何も装備していない基本の鎧'},
  {name:'スケイルセット',atk:4,def:14,desc:'鱗の加護。防御に優れた緑の装備'},
  {name:'カンタータセット',atk:9,def:27,desc:'鋼鉄の青き重装'},
  {name:'ハイオンセット',atk:16,def:44,desc:'深紅の王家装備'}
];
const state={floor:1,x:3,y:3,lv:1,xp:0,next:30,hp:100,maxhp:100,mp:40,maxmp:40,gold:0,pots:3,baseAtk:16,baseDef:8,atk:16,def:8,fairy:true,gear:0,ownedGear:[0],rooms:{},mobModes:{},battle:null,shop:false,fairyStep:false,guard:false,gameover:false};
const dirs={n:[0,-1],s:[0,1],w:[-1,0],e:[1,0]};
function key(x,y){return x+','+y} function room(x,y){return state.rooms[key(x,y)]||'event'}
function recalcGear(){const g=GEAR[state.gear];state.atk=state.baseAtk+g.atk;state.def=state.baseDef+g.def}
function openGear(){renderGear();$('#gearPanel').classList.add('show')}
function closeGear(){$('#gearPanel').classList.remove('show')}
function renderGear(){const el=$('#gearList');el.innerHTML=state.ownedGear.map(i=>{const g=GEAR[i],on=i===state.gear;return '<div class="gearrow '+(on?'equipped':'')+'"><span><b>'+g.name+'</b><br><small class="label">攻+'+g.atk+' 防+'+g.def+' / '+g.desc+'</small></span><button class="mini" data-equip="'+i+'">'+(on?'外す':'装備')+'</button></div>'}).join('');el.querySelectorAll('[data-equip]').forEach(b=>b.onclick=()=>{const i=+b.dataset.equip;state.gear=i===state.gear?0:i;recalcGear();log(i===state.gear?'装備した: '+GEAR[i].name:'装備を外した。','gold');renderGear();render()})}
function log(t,c=''){const d=document.createElement('div');d.className=c;d.textContent=t;$('#message').prepend(d)}
function buildFloor(){state.rooms={};state.mobModes={};state.rooms[key(3,3)]='start';state.rooms[key(3,0)]='boss';state.rooms[key(0,6)]='exit';const put=t=>{let x,y,k;do{x=(Math.random()*size)|0;y=(Math.random()*size)|0;k=key(x,y)}while(state.rooms[k]);state.rooms[k]=t;return k};for(let i=0;i<10;i++){const k=put('mob');state.mobModes[k]=Math.random()<.55?'rook':'bishop'}for(let i=0;i<2;i++)put('spring');put('shop');for(let i=0;i<3;i++)put('treasure')}
function makeMap(){const m=$('#map');for(let y=0;y<size;y++)for(let x=0;x<size;x++){const d=document.createElement('div');d.className='cell';m.append(d);cells.push(d)} buildFloor();log('黒曜の回廊へ。見える脅威を選び、第1層を踏破せよ。','gold');render()}
function icon(t){return t==='exit'?'⇱':t==='spring'?'💧':t==='shop'?'🏮':t==='treasure'?'▣':''}
function render(){for(let y=0;y<size;y++)for(let x=0;x<size;x++){const c=cells[y*size+x],t=room(x,y),hero=x===state.x&&y===state.y;c.className='cell '+t+(hero?' hero':'');c.innerHTML=hero?'<i class="piece heroPiece"></i>':t==='mob'?'<i class="piece mobPiece"></i>':t==='boss'?'<i class="piece bossPiece"></i>':icon(t)} $('#lv').textContent='Lv.'+state.lv;$('#floor').textContent='第'+state.floor+'層';$('#xpTxt').textContent=state.xp+' / '+state.next;$('#xp').style.width=(state.xp/state.next*100)+'%';$('#hpTxt').textContent=Math.ceil(state.hp)+' / '+state.maxhp;$('#hp').style.width=(state.hp/state.maxhp*100)+'%';$('#mpTxt').textContent=Math.ceil(state.mp)+' / '+state.maxmp;$('#mp').style.width=(state.mp/state.maxmp*100)+'%';$('#gold').textContent=state.gold;$('#pots').textContent=state.pots;$('#atk').textContent=state.atk;$('#def').textContent=state.def;$('#fairyStat').textContent=state.fairy?'白光の妖精（回復支援）':'不在';$('#fairy').style.display=state.fairy?'block':'none';$('#gear').textContent='装備: '+GEAR[state.gear].name;$('#runNote').textContent=state.gameover?'回廊から帰還':state.shop?'商店':'探索中';$('#enemyName').textContent=state.battle?state.battle.name:state.shop?'旅商人':'回廊を探索せよ';$('#enemySprite').textContent=state.battle?state.battle.sprite:state.shop?'🧙':'❔';$('#enemyHp').textContent=state.battle?'HP '+Math.max(0,state.battle.hp)+' / '+state.battle.max:'';$('#shopActions').style.display=state.shop?'grid':'none';$('#commands').style.display=state.shop?'none':'grid';document.querySelectorAll('.cmd').forEach(b=>b.disabled=!state.battle||state.gameover);document.querySelectorAll('.dir').forEach(b=>b.disabled=!!state.battle||state.shop||state.gameover)}
function enter(){const k=key(state.x,state.y),t=room(state.x,state.y);if(t==='mob')spawn();else if(t==='boss')spawn(true);else if(t==='treasure'){state.rooms[k]='empty';const g=22+state.floor*12;state.gold+=g;log('宝箱を発見。'+g+' Zenを得た。','gold')}else if(t==='spring'){state.rooms[k]='empty';const h=Math.floor(state.maxhp*.34);state.hp=Math.min(state.maxhp,state.hp+h);state.mp=state.maxmp;log('休息の泉。HP+'+h+'、MP全回復。','good')}else if(t==='shop'){state.shop=true;log('旅商人: 「回廊を進む者よ、備えはあるか？」','gold')}else if(t==='event'){state.rooms[k]='empty';event()}else if(t==='exit'){state.floor++;state.x=3;state.y=3;buildFloor();state.hp=Math.min(state.maxhp,state.hp+25);log('第'+state.floor+'層へ降りた。敵は強くなる。','gold')}else if(t==='empty')log('静かな部屋だ。','mute');render()}
function moveMobs(){
  const mobs=Object.entries(state.rooms).filter(([,t])=>t==='mob').map(([k])=>k).sort((a,b)=>{const [ax,ay]=a.split(',').map(Number),[bx,by]=b.split(',').map(Number);return Math.abs(ax-state.x)+Math.abs(ay-state.y)-Math.abs(bx-state.x)-Math.abs(by-state.y)});
  if(!mobs.length)return '動けるモブはいない';
  for(const from of mobs){const [mx,my]=from.split(',').map(Number),mode=state.mobModes[from]||'rook';let dx=Math.sign(state.x-mx),dy=Math.sign(state.y-my),nx=mx,ny=my;
    if(mode==='bishop'){if(!(dx&&dy))continue;nx+=dx;ny+=dy}else{if(Math.abs(state.x-mx)>=Math.abs(state.y-my))nx+=dx*2||0;else ny+=dy*2||0;if(nx<0||nx>=size||ny<0||ny>=size){nx=mx+Math.sign(state.x-mx);ny=my+Math.sign(state.y-my)}}
    const to=key(nx,ny);if(nx===state.x&&ny===state.y)continue;if(nx>=0&&nx<size&&ny>=0&&ny<size&&!state.rooms[to]){state.rooms[from]='empty';delete state.mobModes[from];state.rooms[to]='mob';state.mobModes[to]=mode;return (mode==='bishop'?'斜め移動モブ':'突進モブ')+'が1体だけ移動'}
  }return 'モブは通路を塞がれている';
}
function showTurnNote(text,kind=''){const n=$('#turnNote');n.textContent=text;n.className=kind}
function move(d){const [dx,dy]=dirs[d],stride=state.fairyStep?2:1,x=state.x+dx*stride,y=state.y+dy*stride;if(x<0||x>=size||y<0||y>=size){log('回廊の壁が行く手を阻む。','mute');state.fairyStep=false;$('#fairyStep')?.classList.remove('ready');return}if(state.fairyStep){state.mp-=6;state.fairyStep=false;$('#fairyStep')?.classList.remove('ready');log('妖精の風に乗り、二歩進んだ。','good')}state.x=x;state.y=y;state.guard=false;enter();if(state.battle){showTurnNote('戦闘中：右側のコマンドを選択','enemyTurn');return}if(!state.shop&&!state.gameover){const moved=moveMobs();log('敵のターン：'+moved,'mute');showTurnNote('敵のターン終了：'+moved,'eventTurn');render()}}
function spawn(boss=false){const scale=1+(state.floor-1)*.38+(state.lv-1)*.16;const types=boss?[['回廊の処刑人','👹',42,12]]:[['闇コウモリ','🦇',18,7],['屍兵','💀',26,9],['石の猟犬','🐺',31,11]];const t=types[(Math.random()*types.length)|0];state.battle={name:t[0],sprite:t[1],hp:Math.floor(t[2]*scale*(boss?2.6:1)),max:0,atk:Math.floor(t[3]*scale*(boss?1.35:1)),boss};state.battle.max=state.battle.hp;log((boss?'⚠ ボス出現: ':'遭遇: ')+t[0],'bad')}
function event(){const r=Math.random();if(r<.30){const h=Math.floor(state.maxhp*.25);state.hp=Math.min(state.maxhp,state.hp+h);log('空白の間で妖精が傷を癒した。HP+'+h,'good')}else if(r<.55){state.mp=Math.min(state.maxmp,state.mp+18);log('魔力の残滓を得た。MP+18','good')}else if(r<.78){const dmg=Math.max(4,Math.floor(state.maxhp*.12));state.hp=Math.max(1,state.hp-dmg);log('床の罠が発動。'+dmg+' ダメージ。','bad')}else{const loss=Math.min(state.gold,10+state.floor*5);state.gold-=loss;log('影に物資を奪われた。Zen -'+loss,'bad')}}
function buy(kind){if(kind==='leave'){state.shop=false;log('旅商人に別れを告げた。','mute');render();return}const cost=kind==='pot'?25:18;if(state.gold<cost){log('Zenが足りない。','bad');return}state.gold-=cost;if(kind==='pot'){state.pots++;log('回復薬を購入した。','good')}else{state.hp=state.maxhp;state.mp=state.maxmp;log('温かな火で休息した。HP・MP全回復。','good')}render()}
function gain(n){state.xp+=n;while(state.xp>=state.next){state.xp-=state.next;state.lv++;state.next=Math.floor(state.next*1.35+10);state.maxhp+=22;state.maxmp+=9;state.hp=state.maxhp;state.mp=state.maxmp;state.baseAtk+=5;state.baseDef+=3;recalcGear();log('LEVEL UP! Lv.'+state.lv+'　全能力上昇','gold')}}
function enemyTurn(){const e=state.battle;if(!e)return;if(e.confuse>0){e.confuse--;log(e.name+'は混乱している。行動できない！','gold');state.guard=false;return}let dmg=Math.max(1,e.atk-state.def*(state.guard?.72:.35));state.hp-=dmg;log(e.name+'の攻撃。'+dmg+' ダメージ。','bad');if(state.fairy&&Math.random()<.42){const h=Math.floor(state.maxhp*.12);state.hp=Math.min(state.maxhp,state.hp+h);log('妖精の祈り。HP+'+h,'good')}state.guard=false;if(state.hp<=0){state.hp=0;state.gameover=true;log('ヌーは回廊で力尽きた。新しい探索を始めよう。','bad');$('#runNote').innerHTML='<button id="restart">新しい探索</button>';$('#restart').onclick=()=>location.reload()}}
function win(){const e=state.battle,g=12+state.floor*8+(e.boss?50:0),xp=16+state.floor*9+(e.boss?70:0);state.gold+=g;gain(xp);log(e.name+'を倒した。EXP '+xp+' / '+g+' Zen','gold');if(e.boss){state.rooms[key(state.x,state.y)]='empty';const next=Math.min(3,state.ownedGear.length);if(next>0&&!state.ownedGear.includes(next)){state.ownedGear.push(next);log('ボスの遺品を入手：'+GEAR[next].name+'。装備画面で付け替えよう。','gold')}}else state.rooms[key(state.x,state.y)]='empty';state.battle=null;render()}
function command(c){if(!state.battle)return;const e=state.battle;let dmg=0;if(c==='attack'){dmg=state.atk+Math.floor(Math.random()*7);log('剣を振るう。'+dmg+' ダメージ。','good')}if(c==='confuse'){if(state.mp<8){log('MPが足りない。','bad');return}state.mp-=8;if(Math.random()<.78){e.confuse=Math.max(e.confuse||0,2);log('悪霊が敵の心を乱した。2ターン混乱！','gold')}else log('混乱は抵抗された。','bad')}if(c==='guard'){state.guard=true;log('防御態勢。次の被ダメージを大幅軽減。','good')}if(c==='potion'){if(!state.pots){log('回復薬がない。','bad');return}state.pots--;const h=Math.floor(state.maxhp*.42);state.hp=Math.min(state.maxhp,state.hp+h);log('回復薬を使用。HP+'+h,'good')}if(dmg)e.hp-=dmg;if(e.hp<=0)win();else{enemyTurn();render()}}
const fairyStepBtn=document.createElement('button');fairyStepBtn.id='fairyStep';fairyStepBtn.className='fairyStep';fairyStepBtn.textContent='🧚 妖精歩行　MP 6';$('#move').after(fairyStepBtn);
fairyStepBtn.onclick=()=>{if(state.battle||state.shop||state.gameover)return;if(!state.fairy||state.mp<6){log('妖精歩行に必要なMPが足りない。','bad');return}state.fairyStep=!state.fairyStep;fairyStepBtn.classList.toggle('ready',state.fairyStep);log(state.fairyStep?'妖精が進路を照らす。次の移動が二歩になる。':'妖精歩行を解除した。','good')};
document.querySelectorAll('.dir').forEach(b=>b.onclick=()=>move(b.dataset.d));document.querySelectorAll('.cmd').forEach(b=>b.onclick=()=>command(b.dataset.c));document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>buy(b.dataset.buy));$('#gearBtn').onclick=openGear;$('#gearClose').onclick=closeGear;makeMap();
</script></body></html>
